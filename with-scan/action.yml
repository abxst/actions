name: 'Docker Publish (with Trivy scan)'
description: 'Build - Scan - Push Docker image'
author: 'abxst (Nguyen Hai)'

branding:
  icon: 'shield'
  color: 'blue'

inputs:
  registry:
    required: false
    default: 'ghcr.io'
  image-name:
    required: false
    default: ${{ github.repository }}
  context:
    required: false
    default: '.'
  dockerfile:
    required: false
    default: './Dockerfile'
  push:
    required: false
    default: 'false'
  registry-username:
    required: true
  registry-password:
    required: true
  tags:
    required: false
    default: |
      type=raw,value={{sha}}-{{date 'DDMMYYYY'}},enable={{is_default_branch}}
      type=raw,value=latest,enable={{is_default_branch}}
  build-args:
    required: false
    default: ''
  platforms:
    required: false
    default: 'linux/amd64,linux/arm64'
  scan-platform:
    required: false
    default: 'linux/amd64'
  gate-severity:
    required: false
    default: 'HIGH,CRITICAL'
  gate-ignore-unfixed:
    required: false
    default: 'true'

outputs:
  image-tags:
    value: ${{ steps.meta.outputs.tags }}
  image-digest:
    value: ${{ steps.push.outputs.digest }}
  image-name-lc:
    value: ${{ steps.lc.outputs.name }}

runs:
  using: 'composite'
  steps:
    - name: Lowercase image name
      id: lc
      shell: bash
      env:
        RAW_NAME: ${{ inputs.image-name }}
      run: echo "name=${RAW_NAME,,}" >> "$GITHUB_OUTPUT"

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to registry
      uses: docker/login-action@v3
      with:
        registry: ${{ inputs.registry }}
        username: ${{ inputs.registry-username }}
        password: ${{ inputs.registry-password }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ inputs.registry }}/${{ steps.lc.outputs.name }}
        tags: ${{ inputs.tags }}

    - name: Build (local for scan)
      uses: docker/build-push-action@v5
      with:
        context: ${{ inputs.context }}
        file: ${{ inputs.dockerfile }}
        load: true
        tags: ${{ steps.lc.outputs.name }}:scan
        labels: ${{ steps.meta.outputs.labels }}
        build-args: ${{ inputs.build-args }}
        platforms: ${{ inputs.scan-platform }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Trivy scan (informational, full)
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ steps.lc.outputs.name }}:scan
        format: table
        exit-code: '0'
        ignore-unfixed: false
        vuln-type: os,library
        severity: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL

    - name: Trivy scan (hard gate)
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ steps.lc.outputs.name }}:scan
        format: table
        exit-code: '1'
        ignore-unfixed: ${{ inputs.gate-ignore-unfixed }}
        vuln-type: os,library
        severity: ${{ inputs.gate-severity }}

    - name: Push
      id: push
      if: inputs.push == 'true'
      uses: docker/build-push-action@v5
      with:
        context: ${{ inputs.context }}
        file: ${{ inputs.dockerfile }}
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        build-args: ${{ inputs.build-args }}
        platforms: ${{ inputs.platforms }}
        cache-from: type=gha
        cache-to: type=gha,mode=max